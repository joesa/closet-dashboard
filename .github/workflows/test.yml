name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout websites sibling (customSite.ts)
        uses: actions/checkout@v4
        with:
          repository: joesa/custom-closets-websites
          ref: main
          path: .ci-siblings/custom-closets-websites
          sparse-checkout: |
            src/lib/customSite.ts
          sparse-checkout-cone-mode: false
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm test
      - name: customSite shared-core sync
        run: npm run test:custom-site-sync -- --websites-root .ci-siblings/custom-closets-websites
